name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Check version consistency
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          pub_version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "$tag_version" != "$pub_version" ]; then
            echo "::error::Tag version ($tag_version) does not match pubspec.yaml version ($pub_version)"
            exit 1
          fi

      - name: Install dependencies
        run: dart pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze

      - name: Run tests
        run: dart test --exclude-tags=integration

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: pub.dev
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Publish to pub.dev
        run: dart pub publish --force
